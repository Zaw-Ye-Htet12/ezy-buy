version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development # uses the dev stage
    container_name: ezy-buy-api
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ezy-buy-network
    volumes:
      - ./src:/usr/src/app/src # hot reload — reflects your code changes
      - ./prisma:/usr/src/app/prisma # reflects schema changes
    command: >
      sh -c "npx prisma migrate deploy && npm run start:dev"

  postgres:
    image: postgres:15-alpine
    container_name: ezy-buy-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-ezybuy_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ezy-buy-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ezybuy_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ezy-buy-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - ezy-buy-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: ezy-buy-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - ezy-buy-network

networks:
  ezy-buy-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
